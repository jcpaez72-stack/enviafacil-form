<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Datos del envío · EnvíaFácil</title>
<style>
  :root{ --amarillo:#FFD100; --negro:#1a1a1a; --gris:#6b7280; --borde:#e5e7eb; --err:#dc2626; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f4f4f5; color:var(--negro); }
  .head{ background:var(--amarillo); padding:18px 20px; }
  .head h1{ margin:0; font-size:19px; font-weight:800; }
  .head p{ margin:4px 0 0; font-size:13px; color:#4b4b4b; }
  form{ padding:16px 18px 96px; max-width:520px; margin:0 auto; }
  .grp{ margin-bottom:14px; }
  label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
  label .req{ color:var(--err); }
  input,select{ width:100%; padding:12px 14px; font-size:16px; border:1.5px solid var(--borde); border-radius:10px; background:#fff; outline:none; -webkit-appearance:none; appearance:none; }
  select{ background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>"); background-repeat:no-repeat; background-position:right 12px center; padding-right:36px; }
  input:focus,select:focus{ border-color:var(--amarillo); }
  input.invalid,select.invalid{ border-color:var(--err); background:#fef2f2; }
  .row{ display:flex; gap:10px; }
  .row .grp{ flex:1; }
  .hint{ font-size:11px; color:var(--gris); margin-top:4px; }
  .errmsg{ font-size:12px; color:var(--err); margin-top:4px; display:none; }
  .seccion{ font-size:12px; font-weight:700; color:var(--gris); text-transform:uppercase; letter-spacing:.4px; margin:6px 0 10px; }
  .barra{ position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--borde); padding:12px 18px; }
  .barra .inner{ max-width:520px; margin:0 auto; }
  button{ width:100%; padding:15px; font-size:16px; font-weight:800; color:var(--negro); background:var(--amarillo); border:none; border-radius:12px; cursor:pointer; }
  button:disabled{ opacity:.6; }
  .ok-screen{ display:none; text-align:center; padding:60px 24px; }
  .ok-screen .check{ font-size:56px; }
  .ok-screen h2{ margin:12px 0 6px; }
  .ok-screen p{ color:var(--gris); }
  .aviso{ margin:0 0 12px; padding:10px 12px; background:#ecfdf5; border:1px solid #a7f3d0; border-radius:10px; font-size:13px; color:#065f46; }
</style>
</head>
<body>
  <div class="head">
    <h1 id="h_titulo">📦 Datos del envío</h1>
    <p id="h_sub">Completa los datos para cotizar tu envío.</p>
  </div>

  <form id="f" novalidate>
    <div class="seccion" id="s_dir">Dirección</div>
    <div class="grp">
      <label>Provincia <span class="req">*</span></label>
      <select id="provincia"><option value="">Selecciona provincia…</option></select>
      <div class="errmsg" id="e_provincia">Selecciona la provincia.</div>
    </div>
    <div class="grp">
      <label>Ciudad <span class="req">*</span></label>
      <select id="ciudad"><option value="">Selecciona ciudad…</option></select>
      <div class="errmsg" id="e_ciudad">Selecciona la ciudad.</div>
    </div>
    <div class="grp">
      <label>Sector / Barrio <span class="req">*</span></label>
      <input id="sector" placeholder="Ej: El Vergel, Chillogallo…" />
      <div class="errmsg" id="e_sector">Ingresa el sector o barrio.</div>
    </div>
    <div class="grp">
      <label>Calle principal <span class="req">*</span></label>
      <input id="calle" placeholder="Av. / Calle principal y referencia" />
      <div class="errmsg" id="e_calle">Ingresa la calle principal.</div>
    </div>

    <div id="detalle">
      <div class="seccion">Detalle del paquete</div>
      <div class="grp">
        <label>Tipo de envío <span class="req">*</span></label>
        <select id="tipo">
          <option value="">Selecciona…</option>
          <option value="201202002002013">📦 Paquete</option>
          <option value="201202002001002">📄 Documento</option>
        </select>
        <div class="errmsg" id="e_tipo">Selecciona el tipo.</div>
      </div>
      <div class="row">
        <div class="grp">
          <label>Piezas <span class="req">*</span></label>
          <input id="piezas" inputmode="numeric" placeholder="Ej: 1" />
          <div class="errmsg" id="e_piezas">N° de piezas.</div>
        </div>
        <div class="grp">
          <label>Peso (kg) <span class="req">*</span></label>
          <input id="peso" inputmode="decimal" placeholder="Ej: 1.5" />
          <div class="errmsg" id="e_peso">Peso en kg.</div>
        </div>
      </div>
      <div class="grp">
        <label>Valor declarado (USD) <span class="req">*</span></label>
        <input id="valor" inputmode="decimal" placeholder="Ej: 20" />
        <div class="errmsg" id="e_valor">Valor en USD.</div>
      </div>
    </div>
  </form>

  <div class="barra"><div class="inner"><button id="btn" type="button">Continuar</button></div></div>

  <div class="ok-screen" id="ok">
    <div class="check">✅</div>
    <h2>¡Datos guardados!</h2>
    <p>Volviendo a WhatsApp…</p>
  </div>
