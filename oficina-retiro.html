body{background:var(--bg);color:var(--ink);padding:14px;max-width:460px;margin:0 auto}
.head{display:flex;align-items:center;gap:10px;margin-bottom:12px}

.sug.show{display:block}
.sug div{padding:10px 13px;font-size:14px;cursor:pointer;border-bottom:1px solid #f0f5f6}

.sug .empty{color:var(--mut);cursor:default}

.chosen .x{margin-left:auto;color:#8a7500;cursor:pointer;font-weight:700}
.ofi{border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;margin-top:10px;cursor:pointer;transition:.12s}
.ofi.sel{border-color:var(--laar);background:#FFFBE0;box-shadow:0 0 0 3px rgba(252,226,0,.25)}
.ofi .nom{font-weight:700;font-size:14px}
.ofi .dir{color:var(--mut);font-size:12px;margin-top:3px}
.ofi .hor{font-size:12px;margin-top:6px;background:#fff8c9;display:inline-block;padding:3px 9px;border-radius:8px}
.hint{font-size:12px;color:var(--mut);margin-top:6px}
.btn{width:100%;padding:15px;border:none;border-radius:13px;background:var(--laar);color:var(--ink);font-size:16px;font-weight:700;cursor:pointer}
.btn:disabled{background:#efe6a8;cursor:not-allowed}
.hidden{display:none}
.salir{margin-top:16px;text-align:center;font-size:13px;color:var(--mut);cursor:pointer;padding:8px}
.salir span{color:#8a7500;font-weight:600;text-decoration:underline}
.salir.alert{margin-top:10px;background:#fff8e0;border:1px solid var(--laar);border-radius:11px;padding:12px;color:var(--ink)}
