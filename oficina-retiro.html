<style>

  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--negro); background:#fff; }
  .wrap{ max-width:520px; margin:0 auto; padding:20px 18px 40px; }

  label{ display:block; font-size:13px; font-weight:600; margin:16px 0 6px; }

  .card{ margin-top:16px; border:1.5px solid var(--linea); border-radius:14px; padding:14px; display:none; }
  .card.show{ display:block; }
  .card .nom{ font-weight:700; font-size:15px; }
  .card .dir{ color:var(--gris); font-size:13px; margin-top:4px; }
  .card .hor{ color:var(--negro); font-size:13px; margin-top:8px; background:#fff8c9; display:inline-block; padding:4px 10px; border-radius:8px; }
  button{ width:100%; margin-top:22px; padding:15px; font-size:16px; font-weight:700; color:var(--negro); background:var(--amarillo); border:none; border-radius:14px; cursor:pointer; }
  button:disabled{ opacity:.5; }
  .msg{ margin-top:14px; font-size:13px; color:var(--gris); text-align:center; }
  .ok{ text-align:center; padding:40px 12px; display:none; }
  .ok.show{ display:block; }
  .ok .big{ font-size:44px; }
</style>
</head>

  function resetCard(){ card.classList.remove("show"); btn.disabled=true; cur=null; }
  function llenarCiudades(prov, ciudadPre){
