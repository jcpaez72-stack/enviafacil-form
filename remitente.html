<!doctype html><html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Datos del remitente · EnvíaFácil</title>
<style>
:root{--laar:#FCE200;--laarD:#E4C201;--ink:#0F0F0F;--mut:#6b6b6b;--bg:#f5f5f5;--card:#fff;--line:#e4e4e4;--err:#c62828}
*{box-sizing:border-box;margin:0;font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
body{background:var(--bg);color:var(--ink);padding:14px;max-width:460px;margin:0 auto}
.head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{width:42px;height:42px;border-radius:12px;background:var(--laar);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:22px}
.head h1{font-size:17px}.head p{font-size:12px;color:var(--mut)}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(20,60,70,.06)}
.fld{margin-bottom:14px}
.lbl{font-size:13px;font-weight:600;margin-bottom:6px;display:block}
input{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;outline:none}
input:focus{border-color:var(--laar)}
.msg{font-size:11px;color:var(--err);margin-top:4px;display:none}
.btn{width:100%;padding:15px;border:none;border-radius:13px;background:var(--laar);color:var(--ink);font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
</style></head><body>
<div class="head"><div class="logo">📇</div><div><h1>Datos del remitente</h1><p>Quien envía el paquete</p></div></div>
<div class="card">
 <div class="fld"><label class="lbl">🆔 Cédula (10) o RUC (13)</label><input id="ced" inputmode="numeric" placeholder="Solo números"><div class="msg" id="mced">Identificación no válida</div></div>
 <div class="fld"><label class="lbl">👤 Nombre y apellido</label><input id="nom" placeholder="Nombre completo"><div class="msg" id="mnom">Escribe tu nombre</div></div>
 <div class="fld"><label class="lbl">📧 Correo electrónico</label><input id="cor" inputmode="email" placeholder="tucorreo@mail.com"><div class="msg" id="mcor">Correo no válido</div></div>
 <div class="fld"><label class="lbl">📱 Celular</label><input id="cel" inputmode="numeric" placeholder="09XXXXXXXX"><div class="msg" id="mcel">Celular no válido (09xxxxxxxx)</div></div>
 <button class="btn" onclick="enviar()">Guardar datos 📇</button>
</div>
<script>
const qs=new URLSearchParams(location.search);
function prov(d){var p=parseInt(d.substr(0,2),10);return (p>=1&&p<=24)||p===30;}
function ced(ci){if(!/^\d{10}$/.test(ci)||!prov(ci))return false;var c=[2,1,2,1,2,1,2,1,2],s=0;for(var i=0;i<9;i++){var x=parseInt(ci[i],10)*c[i];s+=x>9?x-9:x;}return (10-(s%10))%10===parseInt(ci[9],10);}
function ruc(r){if(!/^\d{13}$/.test(r)||!prov(r))return false;var t=parseInt(r[2],10);if(t<6)return ced(r.substr(0,10))&&r.substr(10,3)==='001';if(t===6||t===9)return parseInt(r.substr(10,3),10)>=1;return false;}
function show(id,on){document.getElementById(id).style.display=on?'block':'none';}
function enviar(){
 var c=document.getElementById('ced').value.replace(/\D/g,'');
 var n=document.getElementById('nom').value.trim();
 var e=document.getElementById('cor').value.trim().toLowerCase();
 var t=document.getElementById('cel').value.replace(/\D/g,'');if(/^593\d{9}$/.test(t))t='0'+t.substr(3);
 var okC=(c.length===10&&ced(c))||(c.length===13&&ruc(c));
 var okN=n.length>=3, okE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e), okT=/^09\d{8}$/.test(t);
 show('mced',!okC);show('mnom',!okN);show('mcor',!okE);show('mcel',!okT);
 if(!(okC&&okN&&okE&&okT))return;
 var msg='Datos del remitente 📇\nCédula: '+c+'\nNombre: '+n+'\nCorreo: '+e+'\nCelular: '+t;
 var wa=(qs.get('wa')||'593999842656').replace(/\D/g,'');
 document.body.innerHTML='<div style="text-align:center;padding:70px 22px"><div style="font-size:56px">📇</div><h2 style="color:#0F0F0F;margin-top:8px">¡Datos guardados!</h2><p style="color:#6b6b6b;margin-top:8px">Abriendo WhatsApp… toca <b>enviar</b> 📤</p></div>';
 setTimeout(function(){window.location.href='https://wa.me/'+wa+'?text='+encodeURIComponent(msg);},700);
}
</script></body></html>
