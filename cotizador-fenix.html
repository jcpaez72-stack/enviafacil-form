<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Cotiza tu envío</title><style>:root{--laar:#FCE200;--laarD:#E4C201;--ink:#0F0F0F;--mut:#6b6b6b;--bg:#f5f5f5;--card:#fff;--line:#e4e4e4}
*{box-sizing:border-box;margin:0;font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
body{background:var(--bg);color:var(--ink);padding:14px;max-width:460px;margin:0 auto}
.head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{width:42px;height:42px;border-radius:12px;background:var(--laar);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:22px}
.head h1{font-size:17px}.head p{font-size:12px;color:var(--mut)}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(20,60,70,.06);margin-bottom:12px}
.lbl{font-size:13px;font-weight:600;margin-bottom:8px;display:block}
.step{font-size:11px;color:#8a7500;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.tipos{display:flex;gap:10px}
.tipo{flex:1;border:2px solid var(--line);border-radius:14px;padding:16px 8px;text-align:center;cursor:pointer;transition:.15s;background:#fff}
.tipo .ic{font-size:30px}.tipo .t{font-size:14px;font-weight:600;margin-top:6px}
.tipo.sel{border-color:var(--laar);background:#FFFBE0;box-shadow:0 0 0 3px rgba(252,226,0,.3)}
.fld{margin-bottom:14px;position:relative}
input{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;outline:none}
input:focus{border-color:var(--laar)}
input.bad{border-color:#e11d48;background:#fff5f5}
.errp{color:#e11d48;font-size:12px;margin-top:4px;display:none}
.sug{position:absolute;left:0;right:0;top:100%;z-index:9;background:#fff;border:1px solid var(--line);border-radius:12px;margin-top:4px;max-height:230px;overflow:auto;box-shadow:0 6px 20px rgba(0,0,0,.12);display:none}
.sug.show{display:block}
.sug div{padding:10px 13px;font-size:14px;cursor:pointer;border-bottom:1px solid #f0f5f6}
.sug div:hover{background:#FFFBE0}.sug .pv{font-size:11px;color:var(--mut)}
.sug .empty{color:var(--mut);cursor:default}
.chosen{display:flex;align-items:center;gap:8px;padding:11px 13px;background:#FFFBE0;border:1.5px solid var(--laar);border-radius:11px;font-size:14px;font-weight:600}
.chosen .x{margin-left:auto;color:#8a7500;cursor:pointer;font-weight:700}
.row{display:flex;gap:10px}.row .fld{flex:1}
.hint{font-size:11px;color:var(--mut);margin-top:4px}
.btn{width:100%;padding:15px;border:none;border-radius:13px;background:var(--laar);color:var(--ink);font-size:16px;font-weight:700;cursor:pointer}
.btn:disabled{background:#efe6a8;cursor:not-allowed}
.hidden{display:none}</style></head><body>
