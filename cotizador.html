<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Cotiza tu envío</title><style>:root{--laar:#FCE200;--laarD:#E4C201;--ink:#0F0F0F;--mut:#6b6b6b;--bg:#f5f5f5;--card:#fff;--line:#e4e4e4}
*{box-sizing:border-box;margin:0;font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
body{background:var(--bg);color:var(--ink);padding:14px;max-width:460px;margin:0 auto}
.head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{width:42px;height:42px;border-radius:12px;background:var(--laar);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:22px}
.head h1{font-size:17px}.head p{font-size:12px;color:var(--mut)}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(20,60,70,.06);margin-bottom:12px}
.lbl{font-size:13px;font-weight:600;margin-bottom:8px;display:block}
.step{font-size:11px;color:#8a7500;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.tipos{display:flex;gap:10px}
.tipo{flex:1;border:2px solid var(--line);border-radius:14px;padding:16px 8px;text-align:center;cursor:pointer;transition:.15s;background:#fff}
.tipo .ic{font-size:30px}.tipo .t{font-size:14px;font-weight:600;margin-top:6px}
.tipo.sel{border-color:var(--laar);background:#FFFBE0;box-shadow:0 0 0 3px rgba(252,226,0,.3)}
.fld{margin-bottom:14px;position:relative}
input{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;outline:none}
input:focus{border-color:var(--laar)}
input.bad{border-color:#e11d48;background:#fff5f5}
.errp{color:#e11d48;font-size:12px;margin-top:4px;display:none}
.sug{position:absolute;left:0;right:0;top:100%;z-index:9;background:#fff;border:1px solid var(--line);border-radius:12px;margin-top:4px;max-height:230px;overflow:auto;box-shadow:0 6px 20px rgba(0,0,0,.12);display:none}
.sug.show{display:block}
.sug div{padding:10px 13px;font-size:14px;cursor:pointer;border-bottom:1px solid #f0f5f6}
.sug div:hover{background:#FFFBE0}.sug .pv{font-size:11px;color:var(--mut)}
.sug .empty{color:var(--mut);cursor:default}
.chosen{display:flex;align-items:center;gap:8px;padding:11px 13px;background:#FFFBE0;border:1.5px solid var(--laar);border-radius:11px;font-size:14px;font-weight:600}
.chosen .x{margin-left:auto;color:#8a7500;cursor:pointer;font-weight:700}
.row{display:flex;gap:10px}.row .fld{flex:1}
.hint{font-size:11px;color:var(--mut);margin-top:4px}
.btn{width:100%;padding:15px;border:none;border-radius:13px;background:var(--laar);color:var(--ink);font-size:16px;font-weight:700;cursor:pointer}
.btn:disabled{background:#efe6a8;cursor:not-allowed}
.hidden{display:none}</style></head><body>
<div class="head"><div class="logo">📦</div><div><h1>Cotiza tu envío</h1><p>Puerta a puerta · en segundos</p></div></div>
<div class="card"><div class="step">Paso 1 · ¿Qué vas a enviar?</div><div class="tipos">
<div class="tipo" data-tipo="documento" data-id="201202002001002" onclick="pickTipo(this)"><div class="ic">📄</div><div class="t">Documento</div></div>
<div class="tipo" data-tipo="paquete" data-id="201202002002013" onclick="pickTipo(this)"><div class="ic">📦</div><div class="t">Paquete</div></div></div></div>
<div id="form" class="card hidden"><div class="step">Paso 2 · Datos del envío</div>
<div class="fld"><label class="lbl">📍 Ciudad de origen</label><input id="qOri" placeholder="Escribe tu ciudad..." autocomplete="off" oninput="search('Ori')" onfocus="search('Ori')"><div id="sugOri" class="sug"></div><div id="chOri"></div></div>
<div class="fld"><label class="lbl">🎯 Ciudad de destino</label><input id="qDes" placeholder="Escribe la ciudad destino..." autocomplete="off" oninput="search('Des')" onfocus="search('Des')"><div id="sugDes" class="sug"></div><div id="chDes"></div></div>
<div class="fld hidden" id="fld_piezas"><label class="lbl">📦 Número de piezas</label><input id="piezas" type="number" inputmode="numeric" min="1" max="100" value="1"></div>
<div id="paqFields" class="hidden"><div class="row"><div class="fld"><label class="lbl">⚖️ Peso (kg) — máx 50</label><input id="peso" type="number" inputmode="decimal" min="1" max="50" step="0.1" placeholder="1 a 50 kg" oninput="chkPeso()"><div id="pesoerr" class="errp">⚠️ El peso máximo es 50 kg por envío.</div></div><div class="fld"><label class="lbl">💵 Valor declarado</label><input id="valor" type="number" inputmode="numeric" min="0" placeholder="USD"></div></div></div><button id="cot" class="btn" onclick="cotizar()" disabled>Cotizar 📦</button></div>
<script>let CAT=[];
const qs=new URLSearchParams(location.search);
let executionId=qs.get("executionId")||"";
if(!executionId){var m0=location.href.match(/[?&]executionId=([^&#]+)/);if(m0)executionId=decodeURIComponent(m0[1]);}var EF_N=qs.get("n")||"";var EF_LOCK=(executionId&&EF_N)?("ef_"+executionId+"_"+EF_N+"_"+(qs.get("tipo")||"")):"";function efLocked(){if(!EF_LOCK)return null;try{return localStorage.getItem(EF_LOCK);}catch(e){return null;}}function efLock(d){if(!EF_LOCK)return;try{localStorage.setItem(EF_LOCK,JSON.stringify(d||{}));}catch(e){}}function efShowLocked(){var d={};try{d=JSON.parse(efLocked())||{};}catch(e){}var SKIP={executionId:1,callback:1,success:1,dbgHref:1,idServicio:1};var rows="";for(var k in d){if(SKIP[k]||d[k]===""||d[k]==null)continue;rows+='<div style="display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid #eee"><span style="color:#8a8a8a">'+k.replace(/_/g," ")+'</span><b style="text-align:right;max-width:60%">'+String(d[k])+'</b></div>';}var _wa=((qs.get("wa")||"593999842656").replace(/\D/g,""));document.body.innerHTML='<div style="max-width:430px;margin:0 auto;padding:44px 22px;text-align:center"><div style="font-size:52px">\u2705</div><h2 style="margin:10px 0 4px;color:#0F0F0F">Datos ya enviados</h2><p style="color:#6b6b6b;margin:0 0 16px">Esta informaci\u00f3n ya fue registrada y no se puede modificar aqu\u00ed.</p><div style="text-align:left;background:#fafafa;border:1px solid #eee;border-radius:12px;padding:12px 16px">'+rows+'</div><p style="color:#9b9b9b;font-size:13px;margin-top:14px">Para corregir algo, hazlo desde la conversaci\u00f3n de WhatsApp.</p><a href="https://wa.me/'+_wa+'" style="display:inline-block;margin-top:8px;background:#FFD100;color:#0F0F0F;font-weight:700;padding:12px 26px;border-radius:26px;text-decoration:none">Volver a WhatsApp</a></div>';}if(efLocked()){efShowLocked();}
const EF_KEY="__EF_API_KEY__";const CALLBACK="api/callback";const CATALOG_URL="api/ciudades";(async function(){try{var r=await fetch(CATALOG_URL,{headers:{'X-EF-Key':EF_KEY}});var j=await r.json();if(j&&j.ok&&Array.isArray(j.ciudades))CAT=j.ciudades;}catch(e){}})();
function norm(s){return s.normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toUpperCase();}
let sel={tipo:null,idServicio:null,Ori:null,Des:null};
function pickTipo(el){document.querySelectorAll('.tipo').forEach(t=>t.classList.remove('sel'));el.classList.add('sel');
 sel.tipo=el.dataset.tipo;sel.idServicio=el.dataset.id;document.getElementById('form').classList.remove('hidden');
 const paq=sel.tipo==='paquete';document.getElementById('paqFields').classList.toggle('hidden',!paq);
 document.getElementById('fld_piezas').classList.toggle('hidden',!paq);checkReady();}
function chkPeso(){var el=document.getElementById('peso');var v=parseFloat(el.value||'0');var bad=v>50;el.classList.toggle('bad',bad);var e=document.getElementById('pesoerr');if(e)e.style.display=bad?'block':'none';}
(function(){var pre=(qs.get('tipo')||'').trim().toLowerCase();if(pre==='documento'||pre==='paquete'){var tile=document.querySelector('.tipo[data-tipo="'+pre+'"]');if(tile){pickTipo(tile);var c=tile.closest('.card');if(c)c.style.display='none';}}})();
function search(k){const q=norm(document.getElementById('q'+k).value.trim());const box=document.getElementById('sug'+k);
 if(q.length<2){box.classList.remove('show');return;}
 const hits=CAT.filter(c=>norm(c[0]).includes(q)).slice(0,30);
 if(!hits.length){box.innerHTML='<div class="empty">Sin resultados</div>';box.classList.add('show');return;}
 box.innerHTML=hits.map(c=>`<div onclick="choose('${k}','${c[1]}',${JSON.stringify(c[0]).replace(/"/g,'&quot;')},'${c[2]}')">${c[0]}<div class="pv">${c[2]}</div></div>`).join('');
 box.classList.add('show');}
function choose(k,code,name,prov){sel[k]={code,name,prov};document.getElementById('sug'+k).classList.remove('show');
 document.getElementById('q'+k).classList.add('hidden');
 document.getElementById('ch'+k).innerHTML=`<div class="chosen">\u2705 ${name} <span class="pv">(${prov})</span><span class="x" onclick="clr('${k}')">\u2715</span></div>`;checkReady();}
function clr(k){sel[k]=null;document.getElementById('ch'+k).innerHTML='';const i=document.getElementById('q'+k);i.classList.remove('hidden');i.value='';checkReady();}
function checkReady(){document.getElementById('cot').disabled=!(sel.idServicio&&sel.Ori&&sel.Des);}
async function cotizar(){
 const paq=sel.tipo==='paquete';
 const piezas=paq?parseInt(document.getElementById('piezas').value||'1',10):1;
 const peso=paq?parseFloat(document.getElementById('peso').value||'0'):2;
 const valor=paq?parseFloat(document.getElementById('valor').value||'0'):0;
 if(paq&&!(piezas>=1)){alert('Indica el n\u00famero de piezas (m\u00ednimo 1).');return;}
 if(paq&&!(peso>=1)){alert('Indica el peso en kg (m\u00ednimo 1).');return;}
 if(paq&&peso>50){alert('El peso m\u00e1ximo es 50 kg. Para cargas mayores, cont\u00e1ctanos.');return;}
 const tipoLabel=paq?'Paquete':'Documento';
 const data={origen:sel.Ori.code,origenNombre:sel.Ori.name,destino:sel.Des.code,destinoNombre:sel.Des.name,idServicio:sel.idServicio,tipo:tipoLabel,piezas:piezas,peso:peso,valor:valor};
 if(!executionId){
  const msg='Cotizar mi env\u00edo \ud83d\udce6\nOrigen: '+sel.Ori.name+'\nDestino: '+sel.Des.name+'\nTipo: '+tipoLabel+'\nPiezas: '+piezas+'\nPeso: '+peso+' kg\nValor: $'+valor;
  const wa=(qs.get("wa")||"593999842656").replace(/\D/g,"");
  window.location.href='https://wa.me/'+wa+'?text='+encodeURIComponent(msg);return;
 }
 document.body.innerHTML='<div style="text-align:center;padding:70px 22px"><div style="font-size:56px">\u23f3</div><h2 style="color:#0F0F0F;margin-top:8px">Enviando cotizaci\u00f3n\u2026</h2></div>';
 try{
  await fetch(CALLBACK,{method:'POST',headers:{'Content-Type':'application/json','X-EF-Key':EF_KEY},body:JSON.stringify(Object.assign({executionId:executionId,success:true},data))});efLock(data);
  document.body.innerHTML='<div style="text-align:center;padding:70px 22px"><div style="font-size:56px">\u2705</div><h2 style="color:#0F0F0F;margin-top:8px">\u00a1Listo!</h2><p style="color:#6b6b6b;margin-top:8px">Tu precio ya est\u00e1 en WhatsApp \ud83d\udce6<br><span style="font-size:13px;color:#9b9b9b">Cerrando\u2026</span></p></div>';
  setTimeout(function(){var wa=(qs.get("wa")||"593999842656").replace(/\D/g,"");window.location.href='https://wa.me/'+wa;},5000);
 }catch(e){
  document.body.innerHTML='<div style="text-align:center;padding:70px 22px"><div style="font-size:56px">\u26a0\ufe0f</div><h2 style="color:#0F0F0F;margin-top:8px">No se pudo enviar</h2><p style="color:#6b6b6b;margin-top:8px">Int\u00e9ntalo de nuevo.</p></div>';
 }
}</script></body></html>
